<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Ona AI • Code Assistant</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Rounded" rel="stylesheet"/>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-remote-config-compat.js"></script>

  <style>
    :root {
      --bg-body: #F7F7F7;
      --bg-surface: #FFFFFF;
      --bg-sidebar: #EFEFEF;
      --primary: #4A90E2; 
      --accent: #1A1A1A;
      --text-main: #1A1A1A;
      --text-secondary: #707070;
      --border-color: #EAEAEA;
      --sidebar-width: 280px;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-body);
      color: var(--text-main);
      height: 100svh; 
      display: flex;
      overflow: hidden;
    }

    /* --- SIDEBAR --- */
    .sidebar {
      width: var(--sidebar-width);
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border-color);
      display: none;
      flex-direction: column;
      padding: 20px;
    }

    /* --- AUTH MODAL / BOTTOM SHEET --- */
    #authOverlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); display: none; z-index: 100;
      align-items: flex-end; /* Bottom for mobile */
      justify-content: center;
    }

    .auth-container {
      background: white; width: 100%; padding: 30px;
      border-radius: 24px 24px 0 0; /* Bottom sheet style */
      text-align: center; animation: slideUp 0.3s ease-out;
    }

    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

    .google-btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; max-width: 300px; margin: 20px auto; padding: 12px;
      border: 1px solid var(--border-color); border-radius: 30px;
      background: white; font-weight: 600; cursor: pointer; transition: 0.2s;
    }
    .google-btn:hover { background: #f9f9f9; }

    /* Desktop Modal Style */
    @media (min-width: 768px) {
      .sidebar { display: flex; }
      #authOverlay { align-items: center; } /* Center for desktop */
      .auth-container {
        width: 400px; border-radius: 20px;
        animation: fadeIn 0.3s ease-out;
      }
      @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    }

    /* --- APP CORE --- */
    .app-core { flex: 1; display: flex; flex-direction: column; height: 100%; }

    .app-header {
      background: var(--bg-surface); height: 64px; padding: 0 20px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border-color);
    }
    
    .user-profile { display: flex; align-items: center; gap: 10px; cursor: pointer; }
    .user-profile img { width: 32px; height: 32px; border-radius: 50%; display: none; }

    .main-content { flex: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
    .chat-wrapper { width: 100%; max-width: 800px; display: flex; flex-direction: column; flex: 1; }

    .chat-container { padding: 20px; display: none; flex-direction: column; gap: 24px; }

    /* Code Block Styles */
    .code-block-wrapper { margin: 16px 0; background: #1E1E1E; border-radius: 8px; overflow: hidden; }
    .code-header { display: flex; justify-content: space-between; padding: 8px 16px; background: #2D2D2D; color: #A0A0A0; font-size: 0.8rem; }
    .copy-btn { background: none; border: none; color: inherit; cursor: pointer; font-size: 0.8rem; }
    pre { padding: 16px; overflow-x: auto; color: #D4D4D4; font-family: monospace; font-size: 0.85rem; }

    /* Bottom Section */
    .bottom-section { background: var(--bg-body); padding-bottom: env(safe-area-inset-bottom); width: 100%; }
    .input-bar { padding: 10px 20px 25px 20px; max-width: 800px; margin: 0 auto; }
    .input-box { display: flex; background: white; border: 1px solid var(--border-color); border-radius: 30px; padding: 8px 8px 8px 24px; }
    .input-box.disabled { opacity: 0.5; pointer-events: none; }
    .chat-input { flex: 1; border: none; outline: none; font-family: inherit; }
    .send-btn { width: 44px; height: 44px; border-radius: 50%; background: var(--accent); color: white; border: none; cursor: pointer; }

    .message-row { display: flex; width: 100%; }
    .message-row.user { justify-content: flex-end; }
    .msg-bubble { max-width: 85%; padding: 12px 18px; border-radius: 18px; line-height: 1.5; }
    .msg-bubble.user { background: white; border: 1px solid var(--border-color); }
    .msg-bubble.ai { width: 100%; }
  </style>
</head>
<body>

  <div id="authOverlay">
    <div class="auth-container">
      <h2 style="margin-bottom: 10px;">Welcome to Ona Code</h2>
      <p style="color: var(--text-secondary); margin-bottom: 20px;">Please sign in to start coding.</p>
      <button class="google-btn" onclick="login()">
        <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="20" alt="Google">
        Continue with Google
      </button>
    </div>
  </div>

  <aside class="sidebar">
    <div style="margin-bottom: 30px;">
      <button class="new-chat-btn" onclick="location.reload()" style="width:100%; padding:10px; border-radius:20px; cursor:pointer;">+ New Chat</button>
    </div>
    <div style="font-size: 0.8rem; color: var(--text-secondary);">History (Coming soon)</div>
  </aside>

  <div class="app-core">
    <header class="app-header">
      <div class="app-title">Ona AI</div>
      <div class="user-profile" id="userProfile" onclick="toggleAuth()">
        <span id="userName" style="font-size: 0.9rem; font-weight: 500;">Sign In</span>
        <img id="userAvatar" src="" alt="Avatar">
        <span class="material-symbols-rounded">account_circle</span>
      </div>
    </header>

    <main class="main-content" id="mainScroll">
      <div class="chat-wrapper">
        <div class="chat-container" id="chatContainer"></div>
      </div>
    </main>

    <footer class="bottom-section">
      <div class="input-bar">
        <div class="input-box disabled" id="inputBox">
          <input type="text" class="chat-input" id="userInput" placeholder="Ask a coding question..." />
          <button class="send-btn" onclick="handleSend()"><span class="material-symbols-rounded">arrow_upward</span></button>
        </div>
      </div>
    </footer>
  </div>

  <script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
      apiKey: "AIzaSyBOyZ3As4GTuNvjemvPF_SpsC6m6vqtNhc",
      authDomain: "fire-b-a8878.firebaseapp.com",
      projectId: "fire-b-a8878",
      databaseURL: "https://fire-b-a8878-default-rtdb.firebaseio.com",
      appId: "1:658673187627:web:6e4c29af661785f0afa36e"
    };
    firebase.initializeApp(firebaseConfig);

    const auth = firebase.auth();
    const remoteConfig = firebase.remoteConfig();
    let XAI_API_KEY = "";
    let chatHistory = [{ role: "system", content: "You are Ona AI, an expert coder." }];

    // --- AUTH LOGIC ---
    function login() {
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithPopup(provider);
    }

    function toggleAuth() {
      if (auth.currentUser) {
        if (confirm("Logout?")) auth.signOut();
      } else {
        document.getElementById('authOverlay').style.display = 'flex';
      }
    }

    auth.onAuthStateChanged(user => {
      const overlay = document.getElementById('authOverlay');
      const inputBox = document.getElementById('inputBox');
      const avatar = document.getElementById('userAvatar');
      const nameTxt = document.getElementById('userName');

      if (user) {
        overlay.style.display = 'none';
        inputBox.classList.remove('disabled');
        avatar.src = user.photoURL;
        avatar.style.display = 'block';
        nameTxt.innerText = user.displayName.split(' ')[0];
        document.querySelector('.material-symbols-rounded').style.display = 'none';
      } else {
        overlay.style.display = 'flex';
        inputBox.classList.add('disabled');
        avatar.style.display = 'none';
        nameTxt.innerText = "Sign In";
      }
    });

    // --- CORE LOGIC ---
    async function loadKey() {
      try {
        await remoteConfig.fetchAndActivate();
        XAI_API_KEY = remoteConfig.getValue('xai_api_key').asString();
      } catch (e) {}
    }
    loadKey();

    function formatMarkdown(text) {
      let formatted = text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
      formatted = formatted.replace(/```(\w+)?\n([\s\S]*?)```/g, (m, lang, code) => {
        return `<div class="code-block-wrapper"><div class="code-header"><span>${lang || 'CODE'}</span><button class="copy-btn" onclick="navigator.clipboard.writeText(this.parentElement.nextElementSibling.innerText)">Copy</button></div><pre><code>${code}</code></pre></div>`;
      });
      return formatted.replace(/\n/g, '<br>');
    }

    async function handleSend() {
      const prompt = document.getElementById('userInput').value.trim();
      if (!prompt || !XAI_API_KEY) return;

      const container = document.getElementById('chatContainer');
      container.style.display = 'flex';
      container.innerHTML += `<div class="message-row user"><div class="msg-bubble user">${prompt}</div></div>`;
      
      document.getElementById('userInput').value = '';
      chatHistory.push({ role: "user", content: prompt });

      try {
        const res = await fetch(`https://api.x.ai/v1/chat/completions`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${XAI_API_KEY}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ model: "grok-code-fast-1", messages: chatHistory })
        });
        const data = await res.json();
        const reply = data.choices[0].message.content;
        chatHistory.push({ role: "assistant", content: reply });
        container.innerHTML += `<div class="message-row ai"><div class="msg-bubble ai">${formatMarkdown(reply)}</div></div>`;
      } catch (e) {
        container.innerHTML += `<div style="color:red">Error sending message.</div>`;
      }
      document.getElementById('mainScroll').scrollTop = document.getElementById('mainScroll').scrollHeight;
    }
  </script>
</body>
</html>
