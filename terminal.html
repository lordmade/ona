<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Ona Voice</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-remote-config-compat.js"></script>
  <style>
    /* ══════════════════════════════════════
       DESIGN TOKENS — VOICE THEME
    ══════════════════════════════════════ */
    :root {
      --bg: #0f0f0f;
      --bg-sidebar: #1a1a1a;
      --bg-surface: #1e1e1e;
      --bg-hover: #2a2a2a;
      --bg-input: #252525;
      --accent: #b5651d;
      --accent-mid: #c97a2a;
      --accent-light: #fdf4e8;
      --accent-glow: rgba(181,101,29,.4);
      --text: #f5f5f5;
      --text-dim: #a0a0a0;
      --text-faint: #666666;
      --border: #333333;
      --border-soft: #2a2a2a;
      --red: #ef4444;
      --green: #22c55e;
      --blue: #3b82f6;
      --shadow-xs: 0 1px 2px rgba(0,0,0,.3);
      --shadow-sm: 0 1px 4px rgba(0,0,0,.4);
      --shadow-md: 0 4px 20px rgba(0,0,0,.5);
      --sidebar-w: 260px;
      --hh: 60px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100svh;
      display: flex;
      overflow: hidden;
    }
    /* SIDEBAR */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transition: transform .25s cubic-bezier(.4,0,.2,1);
      z-index: 200;
    }
    .sb-top {
      height: var(--hh);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .logo-box {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-mid) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      font-weight: 600;
      color: #fff;
      flex-shrink: 0;
      box-shadow: 0 2px 10px var(--accent-glow);
    }
    .logo-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -.01em;
    }
    .logo-ver {
      margin-left: auto;
      font-size: 0.65rem;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-faint);
      background: var(--bg-surface);
      border: 1px solid var(--border);
      padding: 3px 8px;
      border-radius: 12px;
    }
    .sb-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }
    .sb-body::-webkit-scrollbar { width: 4px; }
    .sb-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .sb-section-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: var(--text-faint);
      font-family: 'JetBrains Mono', monospace;
      padding: 12px 8px 6px;
    }
    .new-btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 6px;
      border: 1px dashed var(--border);
      background: transparent;
      color: var(--text-dim);
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all .13s;
    }
    .new-btn:hover {
      background: var(--bg-hover);
      color: var(--text);
      border-style: solid;
      border-color: var(--accent);
    }
    .voice-option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 0.8rem;
      color: var(--text-dim);
      cursor: pointer;
      transition: all .12s;
      border: 1px solid transparent;
      margin-bottom: 4px;
    }
    .voice-option:hover { background: var(--bg-hover); color: var(--text); }
    .voice-option.active {
      background: rgba(181,101,29,.15);
      color: var(--accent-light);
      border-color: var(--accent);
    }
    .voice-icon {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
    }
    .voice-option.active .voice-icon {
      background: var(--accent);
      border-color: var(--accent-mid);
      color: white;
    }
    .sb-footer {
      padding: 14px 16px;
      border-top: 1px solid var(--border);
      font-size: 0.65rem;
      color: var(--text-faint);
      font-family: 'JetBrains Mono', monospace;
    }
    .sb-footer em { color: var(--accent); font-style: normal; font-weight: 500; }

    /* MAIN AREA */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }
    .app-header {
      height: var(--hh);
      padding: 0 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-surface);
      flex-shrink: 0;
      box-shadow: var(--shadow-xs);
    }
    .menu-toggle {
      display: none;
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      padding: 6px;
      border-radius: 6px;
    }
    .menu-toggle:hover { background: var(--bg-hover); color: var(--text); }
    .hdr-title {
      font-size: 0.9rem;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-dim);
    }
    .hdr-title b { color: var(--accent); font-weight: 500; }
    .hdr-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .status-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.7rem;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-faint);
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 4px 12px;
      border-radius: 20px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-faint);
      flex-shrink: 0;
      transition: all .3s;
    }
    .status-dot.online { background: var(--green); box-shadow: 0 0 8px rgba(34,197,94,.4); }
    .status-dot.connecting { background: var(--blue); box-shadow: 0 0 8px rgba(59,130,246,.4); animation: pulse 1.5s ease-in-out infinite; }
    .status-dot.speaking { background: var(--accent); box-shadow: 0 0 10px var(--accent-glow); animation: pulse 1s ease-in-out infinite; }
    .status-dot.listening { background: var(--green); box-shadow: 0 0 12px rgba(34,197,94,.5); animation: pulse .8s ease-in-out infinite; }
    .status-dot.error { background: var(--red); box-shadow: 0 0 8px rgba(239,68,68,.4); }
    @keyframes pulse { 0%,100%{ opacity:.6; transform:scale(1); } 50%{ opacity:1; transform:scale(1.1); } }

    /* VOICE INTERFACE */
    .voice-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
      overflow: hidden;
    }
    .voice-orb-container {
      position: relative;
      width: 280px;
      height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 40px;
    }
    .orb-ring {
      position: absolute;
      border-radius: 50%;
      border: 2px solid var(--accent);
      opacity: 0;
      transition: all .3s ease;
    }
    .orb-ring:nth-child(1) { width: 100%; height: 100%; }
    .orb-ring:nth-child(2) { width: 80%; height: 80%; }
    .orb-ring:nth-child(3) { width: 60%; height: 60%; }
    .voice-orb-container.speaking .orb-ring,
    .voice-orb-container.listening .orb-ring {
      opacity: 0.3;
      animation: orb-pulse 2s ease-in-out infinite;
    }
    .voice-orb-container.speaking .orb-ring:nth-child(1),
    .voice-orb-container.listening .orb-ring:nth-child(1) { animation-delay: 0s; }
    .voice-orb-container.speaking .orb-ring:nth-child(2),
    .voice-orb-container.listening .orb-ring:nth-child(2) { animation-delay: 0.3s; }
    .voice-orb-container.speaking .orb-ring:nth-child(3),
    .voice-orb-container.listening .orb-ring:nth-child(3) { animation-delay: 0.6s; }
    .voice-orb-container.speaking .orb-ring { border-color: var(--accent); }
    .voice-orb-container.listening .orb-ring { border-color: var(--green); }
    @keyframes orb-pulse {
      0%, 100% { transform: scale(1); opacity: 0.3; }
      50% { transform: scale(1.05); opacity: 0.6; }
    }
    .voice-orb {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-mid) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all .2s ease;
      box-shadow: 0 4px 30px var(--accent-glow);
      position: relative;
      z-index: 10;
    }
    .voice-orb:hover { transform: scale(1.05); box-shadow: 0 6px 40px var(--accent-glow); }
    .voice-orb:active { transform: scale(0.95); }
    .voice-orb.listening {
      background: linear-gradient(135deg, var(--green) 0%, #16a34a 100%);
      box-shadow: 0 4px 30px rgba(34,197,94,.4);
      animation: listening-pulse 1.5s ease-in-out infinite;
    }
    .voice-orb.speaking {
      background: linear-gradient(135deg, var(--accent) 0%, #ea580c 100%);
      box-shadow: 0 4px 40px var(--accent-glow);
    }
    @keyframes listening-pulse {
      0%, 100% { box-shadow: 0 4px 30px rgba(34,197,94,.4); }
      50% { box-shadow: 0 4px 50px rgba(34,197,94,.7); }
    }
    .voice-orb svg { width: 50px; height: 50px; color: white; }
    .voice-status {
      text-align: center;
      margin-bottom: 30px;
    }
    .voice-status h2 {
      font-size: 1.4rem;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 8px;
    }
    .voice-status p {
      font-size: 0.9rem;
      color: var(--text-dim);
    }
    .transcript-box {
      width: 100%;
      max-width: 600px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      min-height: 120px;
      max-height: 200px;
      overflow-y: auto;
      font-size: 0.95rem;
      line-height: 1.6;
      color: var(--text-dim);
      transition: all .3s;
    }
    .transcript-box.has-content { color: var(--text); }
    .transcript-box::-webkit-scrollbar { width: 4px; }
    .transcript-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .transcript-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--text-faint);
      font-family: 'JetBrains Mono', monospace;
      margin-bottom: 8px;
    }

    /* CONTROLS */
    .controls {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }
    .control-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-surface);
      color: var(--text-dim);
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all .13s;
    }
    .control-btn:hover { background: var(--bg-hover); color: var(--text); border-color: var(--text-dim); }
    .control-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .control-btn.active {
      background: rgba(181,101,29,.2);
      color: var(--accent-light);
      border-color: var(--accent);
    }

    /* AUDIO VISUALIZER */
    .visualizer {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 40px;
      margin-top: 20px;
      opacity: 0;
      transition: opacity .3s;
    }
    .visualizer.active { opacity: 1; }
    .visualizer-bar {
      width: 4px;
      background: var(--accent);
      border-radius: 2px;
      transition: height .1s ease;
    }
    .visualizer.listening .visualizer-bar { background: var(--green); }

    /* OVERLAY + RESPONSIVE */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 150;
      backdrop-filter: blur(4px);
    }
    .overlay.open { display: block; }
    .error-toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--red);
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 0.85rem;
      opacity: 0;
      transition: all .3s ease;
      z-index: 300;
    }
    .error-toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    @media (max-width: 720px) {
      .sidebar { position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .menu-toggle { display: flex; }
      .voice-orb-container { width: 240px; height: 240px; }
      .voice-orb { width: 120px; height: 120px; }
      .voice-orb svg { width: 40px; height: 40px; }
    }
  </style>
  <base target="_blank">
</head>
<body>
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
<div class="error-toast" id="errorToast"></div>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sb-top">
    <div class="logo-box">Ov</div>
    <span class="logo-name">Ona Voice</span>
    <span class="logo-ver">v2.1</span>
  </div>
  <div class="sb-body">
    <div style="padding:8px 0 6px;">
      <button class="new-btn" onclick="newSession()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M12 5v14M5 12h14"/>
        </svg>
        New conversation
      </button>
    </div>
    <div class="sb-section-label">Voice Personality</div>
    <div id="voiceList">
      <div class="voice-option active" data-voice="ara" onclick="selectVoice('ara')">
        <div class="voice-icon">A</div>
        <div>
          <div style="font-weight:500;color:var(--text);">Ara</div>
          <div style="font-size:0.7rem;">Warm, friendly</div>
        </div>
      </div>
      <div class="voice-option" data-voice="eve" onclick="selectVoice('eve')">
        <div class="voice-icon">E</div>
        <div>
          <div style="font-weight:500;color:var(--text);">Eve</div>
          <div style="font-size:0.7rem;">Energetic, upbeat</div>
        </div>
      </div>
      <div class="voice-option" data-voice="rex" onclick="selectVoice('rex')">
        <div class="voice-icon">R</div>
        <div>
          <div style="font-weight:500;color:var(--text);">Rex</div>
          <div style="font-size:0.7rem;">Confident, clear</div>
        </div>
      </div>
      <div class="voice-option" data-voice="leo" onclick="selectVoice('leo')">
        <div class="voice-icon">L</div>
        <div>
          <div style="font-weight:500;color:var(--text);">Leo</div>
          <div style="font-size:0.7rem;">Authoritative</div>
        </div>
      </div>
      <div class="voice-option" data-voice="sal" onclick="selectVoice('sal')">
        <div class="voice-icon">S</div>
        <div>
          <div style="font-weight:500;color:var(--text);">Sal</div>
          <div style="font-size:0.7rem;">Smooth, balanced</div>
        </div>
      </div>
    </div>
    <div class="sb-section-label" style="margin-top:16px;">Settings</div>
    <div style="padding:0 8px;">
      <label style="display:flex;align-items:center;gap:8px;font-size:0.75rem;color:var(--text-dim);cursor:pointer;margin-bottom:8px;">
        <input type="checkbox" id="autoPlay" checked style="accent-color:var(--accent);">
        Auto-play responses
      </label>
      <label style="display:flex;align-items:center;gap:8px;font-size:0.75rem;color:var(--text-dim);cursor:pointer;">
        <input type="checkbox" id="showTranscript" checked style="accent-color:var(--accent);">
        Show transcript
      </label>
    </div>
  </div>
  <div class="sb-footer">model · <em>grok-voice-agent</em></div>
</aside>

<!-- MAIN -->
<main class="main">
  <header class="app-header">
    <button class="menu-toggle" onclick="toggleSidebar()">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M3 12h18M3 6h18M3 18h18"/>
      </svg>
    </button>
    <span class="hdr-title">ona / <b>voice</b></span>
    <div class="hdr-right">
      <div class="status-pill">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusLabel">initializing</span>
      </div>
    </div>
  </header>
  <section class="voice-container">
    <div class="voice-orb-container" id="orbContainer">
      <div class="orb-ring"></div>
      <div class="orb-ring"></div>
      <div class="orb-ring"></div>
      <div class="voice-orb" id="voiceOrb" onclick="toggleVoice()">
        <svg id="micIcon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
        <svg id="stopIcon" style="display:none;" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <rect x="6" y="6" width="12" height="12" rx="2"/>
        </svg>
      </div>
    </div>
    <div class="voice-status">
      <h2 id="statusTitle">Tap to speak</h2>
      <p id="statusSubtitle">Press the microphone and start talking</p>
    </div>
    <div class="visualizer" id="visualizer"></div>
    <div class="transcript-box" id="transcriptBox" style="display:none;">
      <div class="transcript-label">Conversation</div>
      <div id="transcriptContent"></div>
    </div>
    <div class="controls">
      <button class="control-btn" id="muteBtn" onclick="toggleMute()">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
        <span id="muteText">Mute</span>
      </button>
      <button class="control-btn" onclick="clearTranscript()">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
        </svg>
        Clear
      </button>
    </div>
  </section>
</main>

<script>
/* ─────────────────────────────────────────────
   CONSTANTS & CONFIG — FIXED VERSION
───────────────────────────────────────────── */
const WS_URL = 'wss://api.x.ai/v1/realtime';
const AUDIO_FORMAT = { type: 'audio/pcm', rate: 24000 };
const BUFFER_SIZE = 4096;

const SYSTEM_INSTRUCTION = `You are Ona Voice — a helpful, conversational AI assistant.
You are currently engaged in a voice conversation with the user.
Keep your responses concise and natural-sounding since they will be spoken aloud.
Use a conversational, friendly tone. Avoid long lists or code-heavy responses unless specifically asked.
When the user speaks, listen carefully and respond thoughtfully.`;

/* ─────────────────────────────────────────────
   STATE
───────────────────────────────────────────── */
let API_KEY = '';
let ws = null;
let audioContext = null;
let mediaStream = null;
let processor = null;
let isConnected = false;
let isListening = false;
let isSpeaking = false;
let isMuted = false;
let currentVoice = 'ara';
let transcript = [];

const $statusDot = document.getElementById('statusDot');
const $statusLabel = document.getElementById('statusLabel');
const $statusTitle = document.getElementById('statusTitle');
const $statusSubtitle = document.getElementById('statusSubtitle');
const $voiceOrb = document.getElementById('voiceOrb');
const $orbContainer = document.getElementById('orbContainer');
const $micIcon = document.getElementById('micIcon');
const $stopIcon = document.getElementById('stopIcon');
const $transcriptBox = document.getElementById('transcriptBox');
const $transcriptContent = document.getElementById('transcriptContent');
const $visualizer = document.getElementById('visualizer');

/* ─────────────────────────────────────────────
   FIREBASE — FETCH API KEY
───────────────────────────────────────────── */
const firebaseConfig = {
  apiKey: "AIzaSyBOyZ3As4GTuNvjemvPF_SpsC6m6vqtNhc",
  authDomain: "fire-b-a8878.firebaseapp.com",
  projectId: "fire-b-a8878",
  databaseURL: "https://fire-b-a8878-default-rtdb.firebaseio.com",
  appId: "1:658673187627:web:6e4c29af661785f0afa36e"
};

firebase.initializeApp(firebaseConfig);
const rc = firebase.remoteConfig();
rc.settings.minimumFetchIntervalMillis = 0;

(async () => {
  try {
    await rc.fetchAndActivate();
    API_KEY = rc.getValue('xai_api_key').asString() || '';
    console.log('API Key loaded from Firebase');
    setStatus('online', 'ready');
    initVisualizer();
  } catch (e) {
    console.error('Firebase RC error:', e);
    setStatus('error', 'key error');
    showError('Failed to load API key from Firebase. Check console for details.');
  }
})();

/* ─────────────────────────────────────────────
   STATUS & UI
───────────────────────────────────────────── */
function setStatus(state, label) {
  $statusDot.className = 'status-dot ' + state;
  $statusLabel.textContent = label;

  $voiceOrb.classList.remove('listening', 'speaking');
  $orbContainer.classList.remove('listening', 'speaking');

  if (state === 'listening') {
    $statusTitle.textContent = 'Listening...';
    $statusSubtitle.textContent = 'Speak now';
    $voiceOrb.classList.add('listening');
    $orbContainer.classList.add('listening');
    $micIcon.style.display = 'none';
    $stopIcon.style.display = 'block';
  } else if (state === 'speaking') {
    $statusTitle.textContent = 'Speaking...';
    $statusSubtitle.textContent = 'Ona is responding';
    $voiceOrb.classList.add('speaking');
    $orbContainer.classList.add('speaking');
    $micIcon.style.display = 'block';
    $stopIcon.style.display = 'none';
  } else {
    $statusTitle.textContent = 'Tap to speak';
    $statusSubtitle.textContent = 'Press the microphone and start talking';
    $micIcon.style.display = 'block';
    $stopIcon.style.display = 'none';
  }
}

function showError(msg) {
  console.error('Error:', msg);
  const toast = document.getElementById('errorToast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 5000);
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}

function selectVoice(voice) {
  currentVoice = voice;
  document.querySelectorAll('.voice-option').forEach(el => el.classList.remove('active'));
  document.querySelector(`[data-voice="${voice}"]`).classList.add('active');
  
  if (ws && ws.readyState === WebSocket.OPEN) {
    sendEvent({
      type: 'session.update',
      session: { voice: voice }
    });
  }
}

function toggleMute() {
  isMuted = !isMuted;
  const btn = document.getElementById('muteBtn');
  const txt = document.getElementById('muteText');
  if (isMuted) {
    btn.classList.add('active');
    txt.textContent = 'Unmute';
    if (audioContext) audioContext.suspend();
  } else {
    btn.classList.remove('active');
    txt.textContent = 'Mute';
    if (audioContext) audioContext.resume();
  }
}

function clearTranscript() {
  transcript = [];
  $transcriptContent.innerHTML = '';
  $transcriptBox.classList.remove('has-content');
}

function newSession() {
  clearTranscript();
  if (ws) disconnect();
  location.reload();
}

/* ─────────────────────────────────────────────
   WEBSOCKET CONNECTION — IMPROVED
───────────────────────────────────────────── */
async function connect() {
  if (!API_KEY) {
    showError('API key not loaded. Please wait or refresh.');
    return;
  }

  if (ws && ws.readyState === WebSocket.OPEN) {
    console.log('Already connected');
    return;
  }

  try {
    setStatus('connecting', 'connecting...');

    ws = new WebSocket(WS_URL);

    ws.onopen = () => {
      console.log('WebSocket connected');
      isConnected = true;
      
      // Send session configuration
      sendEvent({
        type: 'session.update',
        session: {
          voice: currentVoice,
          instructions: SYSTEM_INSTRUCTION,
          turn_detection: { type: 'server_vad' },
          input_audio_format: 'pcm16',
          output_audio_format: 'pcm16',
          modalities: ['text', 'audio']
        }
      });

      setStatus('online', 'connected');
      startAudioInput();
    };

    ws.onmessage = onWsMessage;
    ws.onerror = (err) => {
      console.error('WebSocket error event:', err);
      showError('Connection error - check console (F12)');
      setStatus('error', 'connection failed');
    };

    ws.onclose = (event) => {
      console.log('WebSocket closed:', event.code, event.reason);
      isConnected = false;
      setStatus('error', 'disconnected');
      showError(`Disconnected (code: ${event.code}). Try again.`);
    };

  } catch (err) {
    console.error('Connect failed:', err);
    showError('Failed to create WebSocket: ' + err.message);
    setStatus('error', 'failed');
  }
}

function disconnect() {
  if (processor) {
    processor.disconnect();
    processor = null;
  }
  if (mediaStream) {
    mediaStream.getTracks().forEach(t => t.stop());
    mediaStream = null;
  }
  if (ws) {
    ws.close();
    ws = null;
  }
  isConnected = false;
  isListening = false;
  setStatus('online', 'ready');
}

function onWsMessage(event) {
  try {
    const data = JSON.parse(event.data);
    console.log('Received event:', data.type);

    switch (data.type) {
      case 'session.created':
      case 'session.updated':
        console.log('Session ready');
        break;

      case 'input_audio_buffer.speech_started':
        setStatus('listening', 'listening');
        break;

      case 'input_audio_buffer.speech_stopped':
        setStatus('online', 'processing...');
        break;

      case 'response.audio.delta':
        if (!isMuted) playAudioChunk(data.delta);
        break;

      case 'response.audio.done':
        setStatus('online', 'ready');
        break;

      case 'response.text.delta':
        appendTranscript('ai', data.delta);
        break;

      case 'conversation.item.input_audio_transcription.completed':
        appendTranscript('user', data.transcript);
        break;

      case 'error':
        showError(data.error?.message || 'Unknown server error');
        setStatus('error', 'error');
        break;

      default:
        console.log('Unhandled event:', data.type);
    }
  } catch (e) {
    console.error('Message parse error:', e);
  }
}

function sendEvent(event) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(event));
  } else {
    console.warn('Cannot send - WebSocket not open');
  }
}

/* ─────────────────────────────────────────────
   AUDIO INPUT
───────────────────────────────────────────── */
async function startAudioInput() {
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({
      audio: {
        sampleRate: 24000,
        channelCount: 1,
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl: true
      }
    });

    audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });

    const source = audioContext.createMediaStreamSource(mediaStream);
    processor = audioContext.createScriptProcessor(BUFFER_SIZE, 1, 1);

    processor.onaudioprocess = (e) => {
      if (!isConnected || isMuted || !ws) return;

      const inputData = e.inputBuffer.getChannelData(0);
      const pcmData = floatTo16BitPCM(inputData);
      const base64 = btoa(String.fromCharCode(...new Uint8Array(pcmData.buffer)));

      sendEvent({
        type: 'input_audio_buffer.append',
        audio: base64
      });

      updateVisualizer(inputData);
    };

    source.connect(processor);
    processor.connect(audioContext.destination);

    console.log('Audio input started successfully');
  } catch (err) {
    console.error('Microphone error:', err);
    showError('Could not access microphone: ' + err.message);
  }
}

function floatTo16BitPCM(floatArray) {
  const intArray = new Int16Array(floatArray.length);
  for (let i = 0; i < floatArray.length; i++) {
    let s = Math.max(-1, Math.min(1, floatArray[i]));
    intArray[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
  }
  return intArray;
}

/* ─────────────────────────────────────────────
   AUDIO OUTPUT
───────────────────────────────────────────── */
function playAudioChunk(base64Audio) {
  if (!audioContext) return;

  try {
    const binary = atob(base64Audio);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) {
      bytes[i] = binary.charCodeAt(i);
    }

    const int16Array = new Int16Array(bytes.buffer);
    const floatArray = new Float32Array(int16Array.length);
    for (let i = 0; i < int16Array.length; i++) {
      floatArray[i] = int16Array[i] / 0x8000;
    }

    const buffer = audioContext.createBuffer(1, floatArray.length, 24000);
    buffer.copyToChannel(floatArray, 0);

    const source = audioContext.createBufferSource();
    source.buffer = buffer;
    source.connect(audioContext.destination);
    source.start();

    setStatus('speaking', 'speaking');
  } catch (e) {
    console.error('Audio playback error:', e);
  }
}

/* ─────────────────────────────────────────────
   VISUALIZER
───────────────────────────────────────────── */
function initVisualizer() {
  $visualizer.innerHTML = '';
  for (let i = 0; i < 20; i++) {
    const bar = document.createElement('div');
    bar.className = 'visualizer-bar';
    bar.style.height = '4px';
    $visualizer.appendChild(bar);
  }
}

function updateVisualizer(data) {
  const bars = $visualizer.querySelectorAll('.visualizer-bar');
  const step = Math.floor(data.length / bars.length) || 1;

  bars.forEach((bar, i) => {
    const value = Math.abs(data[i * step] || 0);
    const height = Math.max(4, Math.floor(value * 45));
    bar.style.height = height + 'px';
  });

  $visualizer.classList.add('active');
  setTimeout(() => $visualizer.classList.remove('active'), 80);
}

/* ─────────────────────────────────────────────
   TRANSCRIPT
───────────────────────────────────────────── */
function appendTranscript(role, text) {
  if (!document.getElementById('showTranscript').checked) return;

  $transcriptBox.style.display = 'block';
  $transcriptBox.classList.add('has-content');

  const entry = document.createElement('div');
  entry.style.marginBottom = '12px';
  entry.innerHTML = `
    <span style="color:${role === 'user' ? 'var(--green)' : 'var(--accent)'}; font-weight:600; font-size:0.75rem; text-transform:uppercase;">
      ${role === 'user' ? 'YOU' : 'ONA'}
    </span>
    <div style="margin-top:3px; color:var(--text); line-height:1.5;">${escapeHtml(text)}</div>
  `;

  $transcriptContent.appendChild(entry);
  $transcriptBox.scrollTop = $transcriptBox.scrollHeight;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

/* ─────────────────────────────────────────────
   MAIN VOICE TOGGLE
───────────────────────────────────────────── */
async function toggleVoice() {
  if (!isConnected) {
    await connect();
  } else if (isListening) {
    // Stop listening and force response
    sendEvent({ type: 'input_audio_buffer.commit' });
    sendEvent({
      type: 'response.create',
      response: { modalities: ['text', 'audio'] }
    });
    isListening = false;
    setStatus('online', 'processing...');
  } else {
    isListening = true;
    setStatus('listening', 'listening...');
  }
}

// Keyboard shortcut: Space to toggle
document.addEventListener('keydown', (e) => {
  if (e.key === ' ' && document.activeElement.tagName !== 'INPUT') {
    e.preventDefault();
    toggleVoice();
  }
});
</script>
