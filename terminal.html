<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Ona Code</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-remote-config-compat.js"></script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>

  <style>
    /* ══════════════════════════════════════
       DESIGN TOKENS — LIGHT THEME
    ══════════════════════════════════════ */
    :root {
      --bg:              #f7f6f3;
      --bg-sidebar:      #efede9;
      --bg-surface:      #ffffff;
      --bg-hover:        #e8e5df;
      --bg-input:        #ffffff;
      --bg-code:         #f6f8fa;
      --bg-code-header:  #eef0f2;
      --claude:          #b5651d;
      --claude-mid:      #c97a2a;
      --claude-light:    #fdf4e8;
      --claude-border:   #e6c38a;
      --text:            #1c1917;
      --text-dim:        #64605a;
      --text-faint:      #aaa49c;
      --border:          #e2ddd7;
      --border-soft:     #ede9e4;
      --red:             #b91c1c;
      --green:           #15803d;
      --think-bg:        #fffcf4;
      --think-bd:        #e6c38a;
      --think-text:      #92600f;
      --shadow-xs:       0 1px 2px rgba(0,0,0,.05);
      --shadow-sm:       0 1px 4px rgba(0,0,0,.07);
      --shadow-md:       0 2px 10px rgba(0,0,0,.09);
      --sidebar-w:       252px;
      --hh:              49px;
      /* long code threshold */
      --long-lines:      30;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100svh;
      display: flex;
      overflow: hidden;
    }

    /* ══════════════════════════════════════
       SIDEBAR
    ══════════════════════════════════════ */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transition: transform .25s cubic-bezier(.4,0,.2,1);
      z-index: 200;
    }

    .sb-top {
      height: var(--hh);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo-box {
      width: 27px;
      height: 27px;
      border-radius: 7px;
      background: var(--claude);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem;
      font-weight: 500;
      color: #fff;
      flex-shrink: 0;
      box-shadow: 0 2px 6px rgba(181,101,29,.28);
    }

    .logo-name {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -.01em;
    }

    .logo-ver {
      margin-left: auto;
      font-size: 0.58rem;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-faint);
      background: var(--bg-surface);
      border: 1px solid var(--border);
      padding: 2px 7px;
      border-radius: 10px;
    }

    .sb-body {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .sb-body::-webkit-scrollbar { width: 4px; }
    .sb-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .sb-section-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--text-faint);
      font-family: 'JetBrains Mono', monospace;
      padding: 10px 8px 5px;
    }

    .new-btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 7px;
      margin-bottom: 4px;
      border: 1px dashed var(--border);
      background: transparent;
      color: var(--text-dim);
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all .13s;
    }
    .new-btn:hover {
      background: var(--bg-hover);
      color: var(--text);
      border-style: solid;
      border-color: var(--claude-border);
    }

    .hist-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 6px;
      font-size: 0.75rem;
      color: var(--text-dim);
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: background .12s;
    }
    .hist-item:hover { background: var(--bg-hover); color: var(--text); }

    .hist-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--claude-border);
      flex-shrink: 0;
    }

    .sb-footer {
      padding: 10px 14px;
      border-top: 1px solid var(--border);
      font-size: 0.62rem;
      color: var(--text-faint);
      font-family: 'JetBrains Mono', monospace;
    }
    .sb-footer em { color: var(--claude); font-style: normal; font-weight: 500; }

    /* ══════════════════════════════════════
       MAIN AREA
    ══════════════════════════════════════ */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .app-header {
      height: var(--hh);
      padding: 0 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-surface);
      flex-shrink: 0;
      box-shadow: var(--shadow-xs);
    }

    .menu-toggle {
      display: none;
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      padding: 5px;
      border-radius: 5px;
    }
    .menu-toggle:hover { background: var(--bg-hover); color: var(--text); }

    .hdr-title {
      font-size: 0.82rem;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-dim);
    }
    .hdr-title b { color: var(--claude); font-weight: 500; }

    .hdr-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.62rem;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-faint);
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 3px 10px;
      border-radius: 20px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-faint);
      flex-shrink: 0;
      transition: background .3s, box-shadow .3s;
    }
    .status-dot.online { background: var(--green); box-shadow: 0 0 5px rgba(21,128,61,.35); }
    .status-dot.busy   { background: var(--claude); box-shadow: 0 0 5px rgba(181,101,29,.4); animation: dot-pulse 1s ease-in-out infinite; }
    .status-dot.error  { background: var(--red); box-shadow: 0 0 5px rgba(185,28,28,.4); }
    @keyframes dot-pulse { 0%,100%{ opacity:.6; } 50%{ opacity:1; } }

    /* ══════════════════════════════════════
       CHAT AREA
    ══════════════════════════════════════ */
    .chat-view {
      flex: 1;
      overflow-y: auto;
      background: var(--bg);
    }
    .chat-view::-webkit-scrollbar { width: 5px; }
    .chat-view::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .chat-inner {
      max-width: 800px;
      margin: 0 auto;
      padding: 28px 22px 8px;
    }

    /* ── Welcome ── */
    .welcome {
      text-align: center;
      padding: 52px 16px 40px;
    }

    .wlc-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--claude) 0%, var(--claude-mid) 100%);
      margin: 0 auto 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 1rem;
      font-weight: 500;
      color: #fff;
      box-shadow: 0 6px 20px rgba(181,101,29,.22);
    }

    .welcome h1 {
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 10px;
    }

    .welcome p {
      font-size: 0.84rem;
      color: var(--text-dim);
      line-height: 1.66;
      max-width: 400px;
      margin: 0 auto 22px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .chip {
      padding: 7px 14px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: var(--bg-surface);
      font-size: 0.72rem;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-dim);
      cursor: pointer;
      transition: all .14s;
      box-shadow: var(--shadow-xs);
    }
    .chip:hover {
      background: var(--claude-light);
      color: var(--claude);
      border-color: var(--claude-border);
    }

    /* ── Message groups ── */
    .msg-group {
      padding: 18px 0;
      border-bottom: 1px solid var(--border-soft);
    }
    .msg-group:last-child { border-bottom: none; }

    .msg-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      font-size: 0.68rem;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-faint);
    }

    .avatar {
      width: 20px;
      height: 20px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.58rem;
      font-weight: 600;
      flex-shrink: 0;
    }
    .avatar.u { background: var(--bg-hover); border: 1px solid var(--border); color: var(--text-dim); }
    .avatar.a { background: var(--claude); color: #fff; }

    .msg-body { padding-left: 28px; }

    .user-bubble {
      display: inline-block;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.87rem;
      line-height: 1.62;
      color: var(--text);
      max-width: 100%;
      word-break: break-word;
      white-space: pre-wrap;
      box-shadow: var(--shadow-xs);
    }

    /* ── AI prose ── */
    .ai-prose {
      font-size: 0.87rem;
      line-height: 1.75;
      color: var(--text);
    }
    .ai-prose p { margin-bottom: 10px; }
    .ai-prose p:last-child { margin-bottom: 0; }
    .ai-prose strong { color: #111; font-weight: 600; }
    .ai-prose em { color: var(--text-dim); }
    .ai-prose ul, .ai-prose ol { padding-left: 18px; margin-bottom: 10px; }
    .ai-prose li { margin-bottom: 4px; }
    .ai-prose h1, .ai-prose h2, .ai-prose h3 {
      color: #111; font-weight: 600; margin: 16px 0 6px; font-size: 0.96rem;
    }
    .ai-prose a { color: var(--claude); text-decoration: underline; }
    .ai-prose blockquote {
      border-left: 3px solid var(--claude-border);
      padding: 4px 0 4px 12px;
      color: var(--text-dim);
      margin: 8px 0;
      font-style: italic;
    }
    .ai-prose hr { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
    .ai-prose table { width: 100%; border-collapse: collapse; font-size: 0.82rem; margin: 10px 0; }
    .ai-prose th {
      background: var(--bg-hover); border: 1px solid var(--border);
      padding: 6px 10px; text-align: left; font-weight: 600; font-size: 0.78rem;
    }
    .ai-prose td { border: 1px solid var(--border); padding: 6px 10px; }
    /* inline code in prose */
    .ai-prose code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.76rem;
      background: var(--bg-code);
      border: 1px solid var(--border);
      padding: 1px 5px;
      border-radius: 4px;
      color: var(--claude);
    }

    /* ══════════════════════════════════════
       THINKING / REASONING BLOCK
    ══════════════════════════════════════ */
    .think-block {
      margin-bottom: 14px;
      border: 1px solid var(--think-bd);
      border-radius: 8px;
      overflow: hidden;
      background: var(--think-bg);
      box-shadow: 0 1px 4px rgba(181,101,29,.06);
    }

    .think-hdr {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      cursor: pointer;
      user-select: none;
    }
    .think-hdr:hover { background: rgba(181,101,29,.03); }

    .think-dots { display: flex; gap: 3px; }
    .think-dots span {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--think-text);
      animation: think-dot 1.3s ease-in-out infinite;
    }
    .think-dots span:nth-child(2) { animation-delay: .18s; }
    .think-dots span:nth-child(3) { animation-delay: .36s; }
    @keyframes think-dot {
      0%,80%,100% { opacity: .2; transform: scale(.75); }
      40%          { opacity: 1;  transform: scale(1);   }
    }

    .think-lbl {
      font-size: 0.68rem;
      font-family: 'JetBrains Mono', monospace;
      color: var(--think-text);
      letter-spacing: .05em;
    }

    .think-chev {
      margin-left: auto;
      color: var(--think-text);
      display: flex;
      align-items: center;
      transition: transform .2s;
    }
    .think-block.open .think-chev { transform: rotate(180deg); }

    .think-body {
      display: none;
      padding: 10px 12px;
      border-top: 1px solid var(--think-bd);
      font-size: 0.73rem;
      line-height: 1.65;
      color: var(--think-text);
      font-family: 'JetBrains Mono', monospace;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 300px;
      overflow-y: auto;
    }
    .think-block.open .think-body { display: block; }
    .think-body::-webkit-scrollbar { width: 3px; }
    .think-body::-webkit-scrollbar-thumb { background: var(--think-bd); border-radius: 2px; }

    /* ══════════════════════════════════════
       CODE BLOCKS  — normal + "file" variant
    ══════════════════════════════════════ */

    /* Shared wrapper */
    .code-wrap {
      margin: 12px 0;
      border-radius: 9px;
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }

    /* "File" wrapper — slightly elevated style for long code */
    .code-wrap.is-file {
      border-color: var(--claude-border);
      box-shadow: 0 2px 10px rgba(181,101,29,.1);
    }

    /* Header bar */
    .code-bar {
      display: flex;
      align-items: center;
      padding: 6px 12px;
      background: var(--bg-code-header);
      border-bottom: 1px solid var(--border);
      gap: 8px;
      min-height: 34px;
    }
    .code-wrap.is-file .code-bar {
      background: #fef9f0;
      border-bottom-color: var(--claude-border);
    }

    /* File icon shown for long-code blocks */
    .file-icon {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.68rem;
      font-family: 'JetBrains Mono', monospace;
      color: var(--claude);
      font-weight: 500;
    }
    .file-icon svg { flex-shrink: 0; }

    .code-lang {
      font-size: 0.6rem;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    /* Action buttons area (right side of bar) */
    .code-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    /* Copy + Download buttons */
    .cb-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 3px 9px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.62rem;
      font-family: 'JetBrains Mono', monospace;
      transition: all .13s;
      white-space: nowrap;
    }
    .cb-btn:hover { color: var(--text); border-color: var(--text-dim); background: var(--bg-hover); }
    .cb-btn.ok { color: var(--green); border-color: var(--green); background: #f0faf3; }
    .cb-btn.download { color: var(--claude); border-color: var(--claude-border); background: var(--claude-light); }
    .cb-btn.download:hover { background: #fdebd0; border-color: var(--claude); }

    /* Line count badge */
    .line-badge {
      font-size: 0.58rem;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-faint);
      background: var(--bg-surface);
      border: 1px solid var(--border);
      padding: 2px 6px;
      border-radius: 10px;
      margin-left: 4px;
    }

    /* The actual code pre element */
    pre.code-body {
      padding: 14px 15px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.77rem;
      line-height: 1.64;
      overflow-x: auto;
      background: var(--bg-code);
      margin: 0;
    }

    /* Long code: show scrollable window, user can expand */
    .code-wrap.is-file pre.code-body {
      max-height: 420px;
      overflow-y: auto;
    }

    pre.code-body::-webkit-scrollbar { height: 4px; width: 4px; }
    pre.code-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* highlight.js light-theme override */
    .hljs { background: transparent !important; padding: 0 !important; }

    /* ══════════════════════════════════════
       INPUT AREA
    ══════════════════════════════════════ */
    .input-area {
      padding: 10px 22px 15px;
      background: var(--bg);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-wrap { max-width: 800px; margin: 0 auto; }

    .input-box {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 10px;
      transition: border-color .15s, box-shadow .15s;
      box-shadow: var(--shadow-xs);
    }
    .input-box:focus-within {
      border-color: var(--claude-border);
      box-shadow: 0 0 0 3px rgba(181,101,29,.07);
    }

    .input-inner {
      display: flex;
      align-items: flex-end;
      padding: 9px 11px;
    }

    .chat-input {
      flex: 1;
      background: none;
      border: none;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.87rem;
      outline: none;
      resize: none;
      min-height: 22px;
      max-height: 160px;
      line-height: 1.55;
    }
    .chat-input::placeholder { color: var(--text-faint); }

    .send-btn {
      width: 32px;
      height: 32px;
      border-radius: 7px;
      background: var(--claude);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-left: 9px;
      flex-shrink: 0;
      transition: all .13s;
      box-shadow: 0 2px 5px rgba(181,101,29,.22);
    }
    .send-btn:hover:not(:disabled) { background: #c4711e; box-shadow: 0 3px 8px rgba(181,101,29,.3); }
    .send-btn:disabled { background: var(--bg-hover); cursor: not-allowed; opacity: .55; box-shadow: none; }

    .input-hint {
      padding: 6px 2px 0;
      font-size: 0.62rem;
      color: var(--text-faint);
      font-family: 'JetBrains Mono', monospace;
      display: flex;
      gap: 14px;
    }
    .kbd {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 0.58rem;
    }

    /* ══════════════════════════════════════
       THINKING / TYPING LOADER
    ══════════════════════════════════════ */
    .typing-loader {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 6px 0;
    }

    .t-dots { display: flex; gap: 4px; }
    .t-dots span {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--claude);
      animation: t-bounce 1.2s ease-in-out infinite;
    }
    .t-dots span:nth-child(2) { animation-delay: .15s; }
    .t-dots span:nth-child(3) { animation-delay: .3s; }
    @keyframes t-bounce {
      0%,80%,100% { opacity: .25; transform: translateY(0); }
      40%          { opacity: 1;   transform: translateY(-3px); }
    }

    .t-label {
      font-size: 0.68rem;
      font-family: 'JetBrains Mono', monospace;
      color: var(--think-text);
      animation: label-fade 2s ease-in-out infinite;
    }
    @keyframes label-fade { 0%,100%{ opacity:.5; } 50%{ opacity:1; } }

    /* ══════════════════════════════════════
       ERROR ROW
    ══════════════════════════════════════ */
    .err-row {
      font-size: 0.83rem;
      color: var(--red);
      padding: 9px 12px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 7px;
    }

    /* ══════════════════════════════════════
       OVERLAY + RESPONSIVE
    ══════════════════════════════════════ */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.3);
      z-index: 150;
      backdrop-filter: blur(2px);
    }
    .overlay.open { display: block; }

    @media (max-width: 720px) {
      .sidebar { position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .menu-toggle { display: flex; }
      .chat-inner { padding: 20px 14px 8px; }
      .input-area { padding: 8px 14px 12px; }
    }
  </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<!-- ══════════════════════════════════════
     SIDEBAR
══════════════════════════════════════ -->
<aside class="sidebar" id="sidebar">
  <div class="sb-top">
    <div class="logo-box">Oc</div>
    <span class="logo-name">Ona Code</span>
    <span class="logo-ver">v1.0</span>
  </div>

  <div class="sb-body">
    <div style="padding:8px 0 4px;">
      <button class="new-btn" onclick="newChat()">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
          <path d="M12 5v14M5 12h14"/>
        </svg>
        New session
      </button>
    </div>
    <div class="sb-section-label">Recent</div>
    <div id="historyList">
      <div style="font-size:0.68rem;color:var(--text-faint);padding:6px 10px;font-family:'JetBrains Mono',monospace;">
        — no sessions yet —
      </div>
    </div>
  </div>

  <div class="sb-footer">model · <em>grok-4-1-fast</em></div>
</aside>

<!-- ══════════════════════════════════════
     MAIN
══════════════════════════════════════ -->
<main class="main">

  <header class="app-header">
    <button class="menu-toggle" onclick="toggleSidebar()">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M3 12h18M3 6h18M3 18h18"/>
      </svg>
    </button>
    <span class="hdr-title">ona / <b>code</b></span>
    <div class="hdr-right">
      <div class="status-pill">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusLabel">connecting</span>
      </div>
    </div>
  </header>

  <section class="chat-view" id="scrollArea">
    <div class="chat-inner" id="chatContainer">

      <div class="welcome" id="welcomeScreen">
        <div class="wlc-icon">Oc</div>
        <h1>Expert Coding Assistant</h1>
        <p>Ask me to write, debug, refactor, or explain code. I always deliver complete, runnable implementations — no placeholders, ever.</p>
        <div class="chips">
          <button class="chip" onclick="inject('Write a full REST API in Node.js with Express, JWT auth middleware, and error handling')">REST API · Node.js</button>
          <button class="chip" onclick="inject('Debug this Python code and show me the fully corrected version')">Debug Python</button>
          <button class="chip" onclick="inject('Build a complete React component with useState, useEffect and full TypeScript types')">React + TypeScript</button>
          <button class="chip" onclick="inject('Explain async/await with a full working Node.js example')">Async / Await</button>
          <button class="chip" onclick="inject('Write a SQL query using JOINs, GROUP BY, and window functions with sample data')">SQL · Window fn</button>
          <button class="chip" onclick="inject('Create a complete Docker Compose setup for Node.js + Postgres + Redis with env vars')">Docker Compose</button>
        </div>
      </div>

    </div>
  </section>

  <footer class="input-area">
    <div class="input-wrap">
      <div class="input-box">
        <div class="input-inner">
          <textarea
            class="chat-input"
            id="userInput"
            placeholder="Write code, debug, explain architecture…"
            rows="1"
          ></textarea>
          <button class="send-btn" id="sendBtn" onclick="handleSend()" disabled>
            <svg width="14" height="14" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24">
              <path d="M12 19V5M5 12l7-7 7 7"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="input-hint">
        <span><span class="kbd">Enter</span> send</span>
        <span><span class="kbd">Shift+Enter</span> newline</span>
      </div>
    </div>
  </footer>

</main>

<!-- ══════════════════════════════════════
     JAVASCRIPT
══════════════════════════════════════ -->
<script>

/* ─────────────────────────────────────────────
   CONSTANTS
───────────────────────────────────────────── */
// Lines threshold: code blocks with >= this many lines
// get the "file" treatment (download button + scrollable)
const LONG_CODE_LINES = 30;

// Extension map: language tag -> file extension
const LANG_EXT = {
  javascript: 'js',  js: 'js',       typescript: 'ts',   ts: 'ts',
  python:     'py',  py: 'py',       java:       'java',
  kotlin:     'kt',  swift:   'swift', go:        'go',
  rust:       'rs',  cpp:     'cpp',   c:         'c',
  csharp:     'cs',  cs:      'cs',    php:       'php',
  ruby:       'rb',  rb:      'rb',    shell:     'sh',
  bash:       'sh',  sh:      'sh',    html:      'html',
  css:        'css', scss:    'scss',  json:      'json',
  yaml:       'yml', yml:     'yml',   xml:       'xml',
  sql:        'sql', graphql: 'graphql', dockerfile: 'Dockerfile',
  markdown:   'md',  md:      'md',    txt:       'txt',
  text:       'txt',
};

function extForLang(lang) {
  return LANG_EXT[(lang || '').toLowerCase()] || 'txt';
}

/* ─────────────────────────────────────────────
   STATE
───────────────────────────────────────────── */
let API_KEY    = "";
let isBusy     = false;
let msgHistory = [];   // [{role, content}, ...]

const $chat   = document.getElementById('chatContainer');
const $input  = document.getElementById('userInput');
const $scroll = document.getElementById('scrollArea');
const $send   = document.getElementById('sendBtn');
const $dot    = document.getElementById('statusDot');
const $lbl    = document.getElementById('statusLabel');

/* ─────────────────────────────────────────────
   FIREBASE — FETCH API KEY
───────────────────────────────────────────── */
const firebaseConfig = {
  apiKey:      "AIzaSyBOyZ3As4GTuNvjemvPF_SpsC6m6vqtNhc",
  authDomain:  "fire-b-a8878.firebaseapp.com",
  projectId:   "fire-b-a8878",
  databaseURL: "https://fire-b-a8878-default-rtdb.firebaseio.com",
  appId:       "1:658673187627:web:6e4c29af661785f0afa36e"
};

firebase.initializeApp(firebaseConfig);
const rc = firebase.remoteConfig();
rc.settings.minimumFetchIntervalMillis = 0;

(async () => {
  try {
    await rc.fetchAndActivate();
    API_KEY = rc.getValue('xai_api_key').asString();
    setStatus('online', 'ready');
    $send.disabled = false;
  } catch (e) {
    setStatus('error', 'key error');
    console.error('Firebase RC error:', e);
  }
})();

/* ─────────────────────────────────────────────
   SYSTEM PROMPT
   Hardcodes the "always full code" contract.
───────────────────────────────────────────── */
const SYSTEM_PROMPT = `You are Ona Code — a senior software engineer and expert full-stack coding assistant. You write complete, production-quality code.

ABSOLUTE CODE RULES (never violate):
1. ALWAYS write the complete, full implementation. Never skip any part of the code.
2. NEVER use "...", "// rest of implementation", "// add your logic here", "// TODO", or any placeholder.
3. NEVER write skeleton code. Every function body must be fully implemented.
4. NEVER omit imports, exports, type definitions, or boilerplate. Include everything needed to run the code.
5. If fixing or debugging, show the FULL corrected file — not just the changed lines.
6. If the implementation is long, still write ALL of it. Do not summarise or truncate code under any circumstances.

RESPONSE FORMAT:
- Start with <think>…</think> containing your internal reasoning: analyze the problem, plan the architecture, consider edge cases, choose the best approach.
- After </think>, write a clean markdown response.
- Use fenced code blocks with the correct language tag for ALL code.
- After each code block add "**Key points:**" with 2–5 concise bullets explaining important decisions.
- Keep prose tight and direct. No filler phrases, no unnecessary disclaimers.
- Write modern, idiomatic, production-quality code with proper error handling.`;

/* ─────────────────────────────────────────────
   STATUS
───────────────────────────────────────────── */
function setStatus(state, label) {
  $dot.className = 'status-dot ' + state;
  $lbl.textContent = label;
}

/* ─────────────────────────────────────────────
   SIDEBAR
───────────────────────────────────────────── */
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}

function newChat() { location.reload(); }

function addHistoryItem(title) {
  const list = document.getElementById('historyList');
  list.innerHTML = '';
  const el = document.createElement('div');
  el.className = 'hist-item';
  el.innerHTML = `<span class="hist-dot"></span>${escHtml(title)}`;
  list.appendChild(el);
}

/* ─────────────────────────────────────────────
   QUICK CHIPS
───────────────────────────────────────────── */
function inject(text) {
  $input.value = text;
  autoResize();
  $send.disabled = false;
  handleSend();
}

/* ─────────────────────────────────────────────
   DOM UTILS
───────────────────────────────────────────── */
function escHtml(str) {
  const d = document.createElement('div');
  d.textContent = String(str);
  return d.innerHTML;
}

function autoResize() {
  $input.style.height = 'auto';
  $input.style.height = Math.min($input.scrollHeight, 160) + 'px';
}

function scrollEnd() {
  requestAnimationFrame(() => { $scroll.scrollTop = $scroll.scrollHeight; });
}

function removeWelcome() {
  const w = document.getElementById('welcomeScreen');
  if (w) w.remove();
}

/* ─────────────────────────────────────────────
   APPEND USER MESSAGE
───────────────────────────────────────────── */
function appendUser(text) {
  removeWelcome();
  const g = document.createElement('div');
  g.className = 'msg-group';
  g.innerHTML = `
    <div class="msg-meta">
      <div class="avatar u">U</div>
      <span>You</span>
    </div>
    <div class="msg-body">
      <div class="user-bubble">${escHtml(text)}</div>
    </div>`;
  $chat.appendChild(g);
  scrollEnd();
}

/* ─────────────────────────────────────────────
   THINKING LOADER (animated)
───────────────────────────────────────────── */
function appendLoader() {
  const id = 'ldr-' + Date.now();
  const g  = document.createElement('div');
  g.className = 'msg-group';
  g.id = id;
  g.innerHTML = `
    <div class="msg-meta">
      <div class="avatar a">Oc</div>
      <span style="color:var(--claude);font-family:'JetBrains Mono',monospace;font-size:0.68rem;font-weight:500;">Ona Code</span>
    </div>
    <div class="msg-body">
      <div class="typing-loader">
        <div class="t-dots"><span></span><span></span><span></span></div>
        <span class="t-label">thinking…</span>
      </div>
    </div>`;
  $chat.appendChild(g);
  scrollEnd();
  return id;
}

/* ─────────────────────────────────────────────
   RENDER AI RESPONSE
───────────────────────────────────────────── */
function appendAI(rawText) {
  // Pull out <think>...</think>
  const thinkMatch = rawText.match(/<think>([\s\S]*?)<\/think>/i);
  const thinkText  = thinkMatch ? thinkMatch[1].trim() : null;
  const prose      = rawText.replace(/<think>[\s\S]*?<\/think>/gi, '').trim();

  const g = document.createElement('div');
  g.className = 'msg-group';

  let html = `
    <div class="msg-meta">
      <div class="avatar a">Oc</div>
      <span style="color:var(--claude);font-family:'JetBrains Mono',monospace;font-size:0.68rem;font-weight:500;">Ona Code</span>
    </div>
    <div class="msg-body">`;

  // Collapsible reasoning block
  if (thinkText) {
    html += `
      <div class="think-block open">
        <div class="think-hdr" onclick="this.parentElement.classList.toggle('open')">
          <div class="think-dots"><span></span><span></span><span></span></div>
          <span class="think-lbl">reasoning trace</span>
          <div class="think-chev">
            <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
              <path d="M6 9l6 6 6-6"/>
            </svg>
          </div>
        </div>
        <div class="think-body">${escHtml(thinkText)}</div>
      </div>`;
  }

  // Main response rendered from markdown
  html += `<div class="ai-prose">${renderMarkdown(prose)}</div>`;
  html += `</div>`;

  g.innerHTML = html;
  $chat.appendChild(g);

  // Apply syntax highlighting to every code block injected
  g.querySelectorAll('pre.code-body').forEach(el => {
    if (el.dataset.hl) return;
    const lang = el.dataset.lang || '';
    try {
      el.innerHTML = (lang && hljs.getLanguage(lang))
        ? hljs.highlight(el.textContent, { language: lang }).value
        : hljs.highlightAuto(el.textContent).value;
    } catch (_) { /* leave plain if hljs fails */ }
    el.dataset.hl = '1';
  });

  scrollEnd();
}

/* ─────────────────────────────────────────────
   MARKDOWN → HTML
   Code blocks are rendered with custom UI.
   Determines "file" vs normal based on line count.
───────────────────────────────────────────── */
function renderMarkdown(text) {
  // Replace fenced code blocks with custom rendered blocks
  const withCode = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    const id       = 'cb-' + Math.random().toString(36).slice(2, 10);
    const rawCode  = code.trim();
    const safeLang = (lang || 'text').toLowerCase();
    const lines    = rawCode.split('\n').length;
    const isFile   = lines >= LONG_CODE_LINES;
    const ext      = extForLang(safeLang);

    // Suggested filename for download
    const filename = `code.${ext}`;

    if (isFile) {
      // Long code — "file" style with download button
      return `
        <div class="code-wrap is-file">
          <div class="code-bar">
            <div class="file-icon">
              <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
              </svg>
              ${escHtml(filename)}
            </div>
            <span class="line-badge">${lines} lines</span>
            <div class="code-actions">
              <button class="cb-btn download" onclick="downloadCode('${id}','${escHtml(filename)}')">
                <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
                </svg>
                Download
              </button>
              <button class="cb-btn" onclick="copyCode('${id}',this)">Copy</button>
            </div>
          </div>
          <pre class="code-body" id="${id}" data-lang="${escHtml(safeLang)}">${escHtml(rawCode)}</pre>
        </div>`;
    } else {
      // Short code — standard style
      return `
        <div class="code-wrap">
          <div class="code-bar">
            <span class="code-lang">${escHtml(safeLang)}</span>
            <div class="code-actions">
              <button class="cb-btn" onclick="copyCode('${id}',this)">Copy</button>
            </div>
          </div>
          <pre class="code-body" id="${id}" data-lang="${escHtml(safeLang)}">${escHtml(rawCode)}</pre>
        </div>`;
    }
  });

  // Parse remaining markdown (headings, lists, bold, etc.)
  return marked.parse(withCode, { breaks: true, gfm: true });
}

/* ─────────────────────────────────────────────
   COPY CODE BUTTON
───────────────────────────────────────────── */
function copyCode(id, btn) {
  const el = document.getElementById(id);
  if (!el) return;
  navigator.clipboard.writeText(el.innerText).then(() => {
    const prev = btn.textContent;
    btn.textContent = 'Copied!';
    btn.classList.add('ok');
    setTimeout(() => {
      btn.textContent = prev.trim() === 'Copied!' ? 'Copy' : prev;
      btn.classList.remove('ok');
    }, 2000);
  }).catch(() => {
    btn.textContent = 'Failed';
    setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
  });
}

/* ─────────────────────────────────────────────
   DOWNLOAD CODE AS FILE
   Creates a temporary Blob URL and clicks it.
───────────────────────────────────────────── */
function downloadCode(id, filename) {
  const el = document.getElementById(id);
  if (!el) return;
  const content  = el.innerText;
  const blob     = new Blob([content], { type: 'text/plain;charset=utf-8' });
  const url      = URL.createObjectURL(blob);
  const anchor   = document.createElement('a');
  anchor.href     = url;
  anchor.download = filename;
  document.body.appendChild(anchor);
  anchor.click();
  document.body.removeChild(anchor);
  URL.revokeObjectURL(url);
}

/* ─────────────────────────────────────────────
   ERROR MESSAGE
───────────────────────────────────────────── */
function appendError(msg) {
  const g = document.createElement('div');
  g.className = 'msg-group';
  g.innerHTML = `
    <div class="msg-meta">
      <div class="avatar a" style="background:var(--red);">!</div>
      <span style="color:var(--red);font-family:'JetBrains Mono',monospace;font-size:0.68rem;">error</span>
    </div>
    <div class="msg-body">
      <div class="err-row">${escHtml(msg)}</div>
    </div>`;
  $chat.appendChild(g);
  scrollEnd();
}

/* ─────────────────────────────────────────────
   MAIN SEND HANDLER
───────────────────────────────────────────── */
async function handleSend() {
  const prompt = $input.value.trim();
  if (!prompt || isBusy || !API_KEY) return;

  // Lock UI
  isBusy = true;
  $send.disabled = true;
  setStatus('busy', 'thinking');

  // Clear input
  $input.value = '';
  autoResize();

  // Render user message
  appendUser(prompt);

  // Push to history
  msgHistory.push({ role: 'user', content: prompt });

  // First message -> sidebar entry
  if (msgHistory.length === 1) {
    addHistoryItem(prompt.length > 44 ? prompt.slice(0, 44) + '…' : prompt);
  }

  // Show thinking loader
  const loaderId = appendLoader();

  try {
    const response = await fetch('https://api.x.ai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${API_KEY}`,
        'Content-Type':  'application/json'
      },
      body: JSON.stringify({
        model:      'grok-4-1-fast-non-reasoning',
        max_tokens: 8192,   // generous — full code needs room
        messages: [
          { role: 'system', content: SYSTEM_PROMPT },
          ...msgHistory
        ]
      })
    });

    const data = await response.json();

    // Remove thinking loader
    document.getElementById(loaderId)?.remove();

    if (data.error) {
      appendError(data.error.message || 'API error — please try again.');
    } else {
      const reply = data.choices[0].message.content;
      msgHistory.push({ role: 'assistant', content: reply });
      appendAI(reply);
    }

  } catch (err) {
    document.getElementById(loaderId)?.remove();
    appendError('Network error — could not reach the API. Check your connection.');
    console.error('API error:', err);
  }

  // Unlock UI
  isBusy = false;
  $send.disabled = !$input.value.trim();
  setStatus('online', 'ready');
}

/* ─────────────────────────────────────────────
   INPUT EVENTS
───────────────────────────────────────────── */
$input.addEventListener('input', () => {
  autoResize();
  $send.disabled = !$input.value.trim() || isBusy || !API_KEY;
});

$input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!$send.disabled) handleSend();
  }
});

</script>
</body>
</html>
