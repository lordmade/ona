<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Ona Code</title>

  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-remote-config-compat.js"></script>

  <style>
    :root {
      --bg: #1a1a1a;
      --bg-panel: #111111;
      --bg-input: #242424;
      --bg-code: #0f0f0f;
      --bg-thinking: #1e1a14;
      --border: #2e2e2e;
      --border-subtle: #222222;
      --orange: #CC785C;
      --orange-dim: #8c4a32;
      --green: #57a97a;
      --green-dim: #2d5e43;
      --blue: #5b9bd5;
      --text: #e8e8e8;
      --text-dim: #888888;
      --text-muted: #555555;
      --font-mono: 'JetBrains Mono', monospace;
      --font-ui: 'Geist', sans-serif;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      background: var(--bg-panel);
      color: var(--text);
      font-family: var(--font-ui);
      overflow: hidden;
    }

    /* ─── LAYOUT ─── */
    .shell {
      display: flex;
      flex-direction: column;
      height: 100svh;
      max-width: 860px;
      margin: 0 auto;
      background: var(--bg);
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      position: relative;
    }

    /* ─── TOPBAR ─── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 48px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-panel);
      flex-shrink: 0;
    }
    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      font-weight: 500;
    }
    .brand-icon {
      width: 22px;
      height: 22px;
      border-radius: 5px;
      background: var(--orange);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      font-weight: 700;
      color: white;
      letter-spacing: -0.5px;
    }
    .brand-name { color: var(--text); }
    .brand-sep { color: var(--text-muted); margin: 0 2px; }
    .brand-mode { color: var(--orange); }

    .topbar-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--text-muted);
    }
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
    }
    .status-dot.thinking {
      background: var(--orange);
      box-shadow: 0 0 6px var(--orange);
      animation: blink 1s infinite;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* ─── CHAT SCROLL ─── */
    .chat-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px 8px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .chat-scroll::-webkit-scrollbar { width: 4px; }
    .chat-scroll::-webkit-scrollbar-track { background: transparent; }
    .chat-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ─── TURN BLOCKS ─── */
    .turn { width: 100%; margin-bottom: 8px; }
    
    /* User turn: right-side prompt style */
    .turn-user {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 12px;
    }
    .turn-user .msg-wrap {
      max-width: 80%;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }
    .turn-user .label {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }
    .turn-user .bubble {
      background: #2a2a2a;
      border: 1px solid #383838;
      padding: 10px 14px;
      border-radius: 10px 10px 2px 10px;
      font-size: 0.875rem;
      line-height: 1.6;
      color: var(--text);
      word-break: break-word;
    }

    /* AI turn: terminal output style */
    .turn-ai {
      display: flex;
      flex-direction: column;
      gap: 0;
      margin-bottom: 20px;
    }
    .turn-ai .row-label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .turn-ai .label {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--orange);
      letter-spacing: 0.5px;
    }
    .turn-ai .label-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, var(--border), transparent);
    }

    .response-body {
      font-size: 0.875rem;
      line-height: 1.7;
      color: var(--text);
    }
    .response-body p { margin-bottom: 8px; }
    .response-body p:last-child { margin-bottom: 0; }
    .response-body strong { color: var(--text); font-weight: 600; }
    .response-body em { color: var(--text-dim); font-style: italic; }
    .response-body code {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      background: var(--bg-code);
      border: 1px solid var(--border);
      padding: 1px 5px;
      border-radius: 3px;
      color: #e0a070;
    }

    /* ─── THINKING BLOCK ─── */
    .thinking-block {
      border: 1px solid #2e2516;
      background: var(--bg-thinking);
      border-radius: 8px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .thinking-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      cursor: pointer;
      user-select: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }
    .thinking-header.open {
      border-bottom-color: #2e2516;
    }
    .thinking-spinner {
      display: flex;
      gap: 3px;
      align-items: center;
    }
    .thinking-spinner span {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--orange);
      animation: thinkPulse 1.2s infinite ease-in-out;
    }
    .thinking-spinner span:nth-child(2) { animation-delay: 0.2s; }
    .thinking-spinner span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes thinkPulse {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }
    .thinking-spinner.done span { animation: none; background: var(--green-dim); transform: scale(1); opacity: 0.8; }

    .thinking-label {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: #8a6a4a;
      flex: 1;
    }
    .thinking-toggle {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--text-muted);
    }
    .thinking-content {
      padding: 12px 14px;
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: #6a5a40;
      line-height: 1.8;
      display: none;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 200px;
      overflow-y: auto;
    }
    .thinking-content.open { display: block; }

    /* ─── CODE BLOCK ─── */
    .code-block {
      margin: 10px 0;
      background: var(--bg-code);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .code-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 14px;
      background: #161616;
      border-bottom: 1px solid var(--border);
    }
    .code-lang {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--orange);
      letter-spacing: 0.5px;
    }
    .code-actions { display: flex; gap: 6px; align-items: center; }
    .copy-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 0.65rem;
      padding: 3px 9px;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: all 0.15s;
    }
    .copy-btn:hover { color: var(--text); border-color: #555; }
    .copy-btn.copied { color: var(--green); border-color: var(--green-dim); }
    .code-body {
      padding: 16px;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      line-height: 1.7;
      overflow-x: auto;
      white-space: pre;
      color: #cdd9e5;
    }

    /* ─── TOOL CALL INDICATOR ─── */
    .tool-indicator {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--text-muted);
      background: #1a1a1a;
      border: 1px solid var(--border-subtle);
      padding: 4px 10px;
      border-radius: 20px;
      margin-bottom: 10px;
    }
    .tool-indicator svg { width: 10px; height: 10px; fill: none; stroke: var(--orange); stroke-width: 2; }

    /* ─── LOADING DOTS ─── */
    .thinking-live {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
    }
    .tl-dots {
      display: flex;
      gap: 4px;
    }
    .tl-dots span {
      display: block;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--orange);
      animation: thinkPulse 1.2s infinite ease-in-out;
    }
    .tl-dots span:nth-child(2) { animation-delay: 0.2s; }
    .tl-dots span:nth-child(3) { animation-delay: 0.4s; }
    .tl-text {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: #8a6a4a;
      animation: textFade 2s infinite;
    }
    @keyframes textFade { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }

    /* ─── INPUT AREA ─── */
    .input-zone {
      padding: 16px 20px 20px;
      background: var(--bg);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .input-wrap {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      transition: border-color 0.2s;
    }
    .input-wrap:focus-within { border-color: #555; }
    .input-top {
      display: flex;
      align-items: flex-end;
      padding: 10px 14px;
      gap: 10px;
    }
    .chat-textarea {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.85rem;
      line-height: 1.6;
      resize: none;
      min-height: 22px;
      max-height: 180px;
      padding: 2px 0;
    }
    .chat-textarea::placeholder { color: var(--text-muted); }
    .send-btn {
      flex-shrink: 0;
      width: 32px;
      height: 32px;
      background: var(--orange);
      border: none;
      border-radius: 7px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, opacity 0.15s;
    }
    .send-btn:hover { background: #d98060; }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .send-btn svg { width: 14px; height: 14px; fill: none; stroke: white; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

    .input-footer {
      padding: 6px 14px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid var(--border-subtle);
    }
    .input-hint {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--text-muted);
    }
    .kbd {
      background: #222;
      border: 1px solid #3a3a3a;
      border-radius: 3px;
      padding: 1px 5px;
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: #666;
    }
    .model-tag {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .model-tag::before {
      content: '';
      display: inline-block;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--green-dim);
    }

    /* ─── WELCOME SCREEN ─── */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 50vh;
      text-align: center;
      gap: 20px;
      padding: 40px 20px;
    }
    .welcome-logo {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: linear-gradient(135deg, #CC785C 0%, #8c4a32 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: 1.2rem;
      color: white;
      box-shadow: 0 8px 32px rgba(204, 120, 92, 0.25);
    }
    .welcome h2 {
      font-size: 1.15rem;
      font-weight: 500;
      color: var(--text);
      letter-spacing: -0.3px;
    }
    .welcome p {
      font-size: 0.825rem;
      color: var(--text-muted);
      max-width: 340px;
      line-height: 1.7;
      font-family: var(--font-mono);
    }
    .welcome-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      max-width: 500px;
    }
    .chip {
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 6px 12px;
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.15s;
    }
    .chip:hover { border-color: var(--orange); color: var(--orange); background: #201816; }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 640px) {
      .chat-scroll { padding: 16px 14px 4px; }
      .input-zone { padding: 12px 14px 16px; }
    }

    /* ─── SCROLLBAR ─── */
    .thinking-content::-webkit-scrollbar { width: 3px; }
    .thinking-content::-webkit-scrollbar-thumb { background: var(--border); }
    .code-body::-webkit-scrollbar { height: 4px; }
    .code-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  </style>
</head>
<body>

<div class="shell">
  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-brand">
      <div class="brand-icon">∅</div>
      <span class="brand-name">ona</span>
      <span class="brand-sep">/</span>
      <span class="brand-mode">code</span>
    </div>
    <div class="topbar-meta">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">ready</span>
    </div>
  </div>

  <!-- CHAT -->
  <div class="chat-scroll" id="chatScroll">
    <div id="chatContainer">
      <!-- Welcome screen -->
      <div class="welcome" id="welcomeScreen">
        <div class="welcome-logo">∅</div>
        <h2>What are we building?</h2>
        <p>Expert coding assistant. Ask for code, debugging, architecture, or technical explanations.</p>
        <div class="welcome-chips">
          <div class="chip" onclick="fillPrompt('Build a REST API with Express.js')">REST API scaffold</div>
          <div class="chip" onclick="fillPrompt('Debug this code:')">Debug code</div>
          <div class="chip" onclick="fillPrompt('Write a React component for')">React component</div>
          <div class="chip" onclick="fillPrompt('Explain how async/await works in JavaScript')">Explain concept</div>
          <div class="chip" onclick="fillPrompt('Write a Python script to')">Python script</div>
          <div class="chip" onclick="fillPrompt('Optimize this SQL query:')">SQL optimize</div>
        </div>
      </div>
    </div>
  </div>

  <!-- INPUT -->
  <div class="input-zone">
    <div class="input-wrap">
      <div class="input-top">
        <textarea 
          id="chatInput" 
          class="chat-textarea" 
          placeholder="Ask for code, explain a concept, or paste something to debug..."
          rows="1"
        ></textarea>
        <button class="send-btn" id="sendBtn" onclick="handleSend()">
          <svg viewBox="0 0 24 24"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
        </button>
      </div>
      <div class="input-footer">
        <div class="input-hint"><kbd class="kbd">Enter</kbd> send &nbsp;·&nbsp; <kbd class="kbd">Shift+Enter</kbd> newline</div>
        <div class="model-tag">grok-3-fast</div>
      </div>
    </div>
  </div>
</div>

<script>
  let XAI_API_KEY = "";
  let isThinking = false;
  const chatContainer = document.getElementById('chatContainer');
  const chatInput = document.getElementById('chatInput');
  const chatScroll = document.getElementById('chatScroll');
  const sendBtn = document.getElementById('sendBtn');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  let welcomeRemoved = false;
  let conversationHistory = [];

  // Firebase init
  const firebaseConfig = {
    apiKey: "AIzaSyBOyZ3As4GTuNvjemvPF_SpsC6m6vqtNhc",
    authDomain: "fire-b-a8878.firebaseapp.com",
    projectId: "fire-b-a8878",
    databaseURL: "https://fire-b-a8878-default-rtdb.firebaseio.com",
    appId: "1:658673187627:web:6e4c29af661785f0afa36e"
  };
  firebase.initializeApp(firebaseConfig);
  const remoteConfig = firebase.remoteConfig();
  remoteConfig.settings.minimumFetchIntervalMillis = 0;
  async function init() {
    try {
      await remoteConfig.fetchAndActivate();
      XAI_API_KEY = remoteConfig.getValue('xai_api_key').asString();
    } catch (e) { console.error(e); }
  }
  init();

  // Auto-resize textarea
  chatInput.addEventListener('input', function () {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 180) + 'px';
  });

  chatInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
  });

  function fillPrompt(text) {
    chatInput.value = text;
    chatInput.dispatchEvent(new Event('input'));
    chatInput.focus();
    chatInput.setSelectionRange(text.length, text.length);
  }

  function scrollBottom() {
    chatScroll.scrollTop = chatScroll.scrollHeight;
  }

  function setStatus(state) {
    if (state === 'thinking') {
      statusDot.className = 'status-dot thinking';
      statusText.textContent = 'thinking...';
    } else if (state === 'writing') {
      statusDot.className = 'status-dot thinking';
      statusText.textContent = 'writing code';
    } else {
      statusDot.className = 'status-dot';
      statusText.textContent = 'ready';
    }
  }

  function removeWelcome() {
    if (!welcomeRemoved) {
      const w = document.getElementById('welcomeScreen');
      if (w) w.remove();
      welcomeRemoved = true;
    }
  }

  async function handleSend() {
    const prompt = chatInput.value.trim();
    if (!prompt || isThinking) return;
    if (!XAI_API_KEY) { appendAIMessage('⚠ API key not loaded yet. Please try again.', [], null); return; }

    isThinking = true;
    sendBtn.disabled = true;
    chatInput.value = '';
    chatInput.style.height = 'auto';
    removeWelcome();

    // Append user message
    appendUserMessage(prompt);

    // Add to conversation
    conversationHistory.push({ role: 'user', content: prompt });

    // Append loader
    const loaderId = appendThinkingLoader();
    setStatus('thinking');
    scrollBottom();

    try {
      const res = await fetch("https://api.x.ai/v1/chat/completions", {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${XAI_API_KEY}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          model: "grok-3-fast",
          max_tokens: 6000,
          messages: [
            {
              role: "system",
              content: `You are an elite software engineer. Your job is to write clean, production-quality code and provide expert technical guidance.

Rules:
1. Always provide working, correct code. Prefer complete implementations over snippets.
2. Use proper code blocks with language tags: \`\`\`javascript, \`\`\`python, \`\`\`bash, etc.
3. Keep prose explanations concise. Let code speak for itself.
4. Before code, write a single short sentence saying what you're building.
5. After code, add a brief 1-2 sentence explanation of key decisions only.
6. Never include unnecessary caveats, disclaimers, or filler text.
7. For debugging: identify the bug clearly, then show the fix.
8. For architecture questions: give a direct recommendation with reasoning.`
            },
            ...conversationHistory
          ]
        })
      });

      const data = await res.json();
      document.getElementById(loaderId)?.remove();

      if (data.error) {
        appendAIMessage(`Error: ${data.error.message}`, [], null);
      } else {
        const content = data.choices[0].message.content;
        conversationHistory.push({ role: 'assistant', content });
        setStatus('writing');

        // Simulated thinking text (last user prompt as topic)
        const thinkText = generateThinkingText(prompt);
        appendAIMessage(content, [], thinkText);
      }
    } catch (err) {
      document.getElementById(loaderId)?.remove();
      appendAIMessage(`Connection error: ${err.message}`, [], null);
    } finally {
      isThinking = false;
      sendBtn.disabled = false;
      setStatus('ready');
      scrollBottom();
    }
  }

  function generateThinkingText(prompt) {
    const p = prompt.toLowerCase();
    if (p.includes('bug') || p.includes('error') || p.includes('fix') || p.includes('debug')) {
      return `Analyzing the code for potential issues...\nChecking common error patterns and edge cases...\nIdentifying root cause and formulating minimal fix...`;
    } else if (p.includes('api') || p.includes('server') || p.includes('backend')) {
      return `Designing API structure and route handlers...\nConsidering error handling and middleware patterns...\nSelecting appropriate response formats and status codes...`;
    } else if (p.includes('react') || p.includes('component') || p.includes('ui')) {
      return `Planning component architecture and state management...\nConsidering prop types and rendering performance...\nStructuring hooks and side effects cleanly...`;
    } else if (p.includes('sql') || p.includes('database') || p.includes('query')) {
      return `Analyzing query structure for optimization opportunities...\nChecking index usage and join patterns...\nConsidering N+1 problems and query complexity...`;
    } else if (p.includes('python')) {
      return `Selecting appropriate Python idioms and libraries...\nConsidering edge cases and type handling...\nStructuring for readability and performance...`;
    } else {
      return `Breaking down the requirements...\nDesigning clean architecture for the solution...\nConsidering edge cases and best practices...`;
    }
  }

  function appendUserMessage(text) {
    const turn = document.createElement('div');
    turn.className = 'turn turn-user';
    turn.innerHTML = `
      <div class="msg-wrap">
        <div class="label">you</div>
        <div class="bubble">${escapeHtml(text)}</div>
      </div>`;
    chatContainer.appendChild(turn);
    scrollBottom();
  }

  function appendThinkingLoader() {
    const id = 'loader-' + Date.now();
    const turn = document.createElement('div');
    turn.className = 'turn turn-ai';
    turn.id = id;
    turn.innerHTML = `
      <div class="row-label">
        <span class="label">ona</span>
        <div class="label-line"></div>
      </div>
      <div class="thinking-live">
        <div class="tl-dots">
          <span></span><span></span><span></span>
        </div>
        <span class="tl-text">thinking through your code...</span>
      </div>`;
    chatContainer.appendChild(turn);
    return id;
  }

  function appendAIMessage(rawText, toolCalls, thinkText) {
    const turn = document.createElement('div');
    turn.className = 'turn turn-ai';

    let html = `
      <div class="row-label">
        <span class="label">ona</span>
        <div class="label-line"></div>
      </div>`;

    // Thinking block
    if (thinkText) {
      const thinkId = 'think-' + Math.random().toString(36).substr(2, 6);
      html += `
        <div class="thinking-block">
          <div class="thinking-header" onclick="toggleThink('${thinkId}')">
            <div class="thinking-spinner done"><span></span><span></span><span></span></div>
            <span class="thinking-label">Thought through the problem</span>
            <span class="thinking-toggle" id="toggle-${thinkId}">show ▾</span>
          </div>
          <div class="thinking-content" id="${thinkId}">${escapeHtml(thinkText)}</div>
        </div>`;
    }

    html += `<div class="response-body">${formatResponse(rawText)}</div>`;
    turn.innerHTML = html;
    chatContainer.appendChild(turn);
    scrollBottom();
  }

  function toggleThink(id) {
    const content = document.getElementById(id);
    const toggle = document.getElementById('toggle-' + id);
    const header = content.previousElementSibling;
    if (content.classList.contains('open')) {
      content.classList.remove('open');
      header.classList.remove('open');
      toggle.textContent = 'show ▾';
    } else {
      content.classList.add('open');
      header.classList.add('open');
      toggle.textContent = 'hide ▴';
    }
  }

  function formatResponse(text) {
    // Extract code blocks first
    const parts = [];
    const regex = /```(\w*)\n?([\s\S]*?)```/g;
    let last = 0, m;

    while ((m = regex.exec(text)) !== null) {
      if (m.index > last) parts.push({ type: 'text', content: text.slice(last, m.index) });
      parts.push({ type: 'code', lang: m[1] || 'code', content: m[2].trim() });
      last = m.index + m[0].length;
    }
    if (last < text.length) parts.push({ type: 'text', content: text.slice(last) });

    return parts.map(p => {
      if (p.type === 'code') {
        const id = 'cb-' + Math.random().toString(36).substr(2, 8);
        return `
          <div class="code-block">
            <div class="code-bar">
              <span class="code-lang">${escapeHtml(p.lang)}</span>
              <div class="code-actions">
                <button class="copy-btn" id="btn-${id}" onclick="copyCode('${id}', 'btn-${id}')">
                  <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                  copy
                </button>
              </div>
            </div>
            <div class="code-body" id="${id}">${escapeHtml(p.content)}</div>
          </div>`;
      } else {
        return formatText(p.content);
      }
    }).join('');
  }

  function formatText(text) {
    return text
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\n{2,}/g, '</p><p>')
      .replace(/\n/g, '<br>')
      .replace(/^/, '<p>')
      .replace(/$/, '</p>');
  }

  function copyCode(codeId, btnId) {
    const code = document.getElementById(codeId).innerText;
    const btn = document.getElementById(btnId);
    navigator.clipboard.writeText(code).then(() => {
      btn.classList.add('copied');
      btn.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> copied`;
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> copy`;
      }, 2000);
    });
  }

  function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }
</script>
